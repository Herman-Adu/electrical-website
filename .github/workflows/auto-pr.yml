name: Auto PR — Review, Fix Gates, Merge

# Triggers on PR activity targeting main.
# Loop:
#   1. Request Copilot PR review (advisory — COMMENTED only, not APPROVED).
#   2. Enable auto-merge (squash) only when the PR is explicitly labeled
#      `ready-to-merge`.
#   3. Protected-branch requirements still apply: required checks, required
#      approval, and resolved conversations must all pass before merge.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
    branches:
      - main

# Prevent duplicate runs on the same ref.
concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # needed for merge
  pull-requests: write # needed for review request + auto-merge
  checks: read # needed to read check statuses

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Request Copilot PR review + enable auto-merge in parallel.
  # ─────────────────────────────────────────────────────────────────────────
  setup-pr:
    name: Request review
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot PR review
        # Uses the official Copilot reviewer endpoint.
        # This is non-blocking — it queues the review asynchronously.
        run: |
          gh pr review --request "copilot" "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  enable-auto-merge:
    name: Enable auto-merge when ready
    needs: setup-pr
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'ready-to-merge')
    steps:
      - name: Enable auto-merge (squash)
        # PR merges automatically once all required status checks pass,
        # required review is present, and all required conversations are resolved.
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --auto \
            --squash \
            --delete-branch \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Post a status comment so you can track where the PR is in the loop.
  # ─────────────────────────────────────────────────────────────────────────
  status-comment:
    name: Post automation status
    needs: [setup-pr, enable-auto-merge]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Comment when ready-to-merge is present
        if: contains(github.event.pull_request.labels.*.name, 'ready-to-merge')
        run: |
          body="$(printf '%s\n' \
            "**Auto-PR automation active** on commit \`${{ github.sha }}\`" \
            "" \
            "| Step | Status |" \
            "|------|--------|" \
            "| Copilot review requested | ✅ |" \
            "| Auto-merge enabled (squash) | ✅ |" \
            "| E2E Tests | ⏳ running |" \
            "| Lighthouse CI | ⏳ running |" \
            "" \
            "Protected branch rules on \`main\` still control merging." \
            "Auto-merge will wait for any required reviews, resolved conversations, and checks configured there.")"
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "$body"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment when ready-to-merge is missing
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'ready-to-merge') }}
        run: |
          body="$(printf '%s\n' \
            "**Auto-PR automation active** on commit \`${{ github.sha }}\`" \
            "" \
            "| Step | Status |" \
            "|------|--------|" \
            "| Copilot review requested | ✅ |" \
            "| Auto-merge enabled (squash) | ⏸ waiting for \`ready-to-merge\` label |" \
            "| E2E Tests | ⏳ running |" \
            "| Lighthouse CI | ⏳ running |" \
            "" \
            "Protected branch rules on \`main\` still control merging." \
            "Add the \`ready-to-merge\` label only after checks pass and review comments are resolved.")"
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "$body"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

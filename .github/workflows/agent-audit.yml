name: Agent Audit

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      export_snapshot:
        description: "Export heuristic snapshot to workflow summary"
        type: boolean
        default: true

jobs:
  health-and-audit:
    name: Agent system health and audit report
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate agent package types
        run: pnpm --dir agent exec tsc --noEmit

      - name: Validate skill registry integrity
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, existsSync } from 'fs';

          const skillIdsFile = readFileSync('agent/constants/skill-ids.ts', 'utf8');
          const idMatches = [...skillIdsFile.matchAll(/sid\("([^"]+)"\)/g)];
          const skills = idMatches.map(m => m[1]);

          if (skills.length === 0) {
            console.error('No skills found in agent/constants/skill-ids.ts');
            process.exit(1);
          }

          let allValid = true;
          for (const skill of skills) {
            const path = `agent/skills/${skill}.skill.ts`;
            if (!existsSync(path)) {
              console.error(`✗ Missing skill file: ${path}`);
              allValid = false;
              continue;
            }

            const content = readFileSync(path, 'utf8');

            const checks = [
              { field: 'id:', label: 'id' },
              { field: 'version:', label: 'version' },
              { field: 'description:', label: 'description' },
              { field: 'requiredServers:', label: 'requiredServers' },
              { field: 'costTier:', label: 'costTier' },
              { field: 'dryRunCapable:', label: 'dryRunCapable' },
              { field: 'fitness(', label: 'fitness function' },
              { field: 'execute(', label: 'execute function' },
            ];

            for (const check of checks) {
              if (!content.includes(check.field)) {
                console.error(`✗ ${skill}.skill.ts missing ${check.label}`);
                allValid = false;
              }
            }

            if (allValid) {
              console.log(`✓ ${skill}.skill.ts`);
            }
          }

          if (!allValid) process.exit(1);
          console.log(`\n✓ All ${skills.length} skill manifests are structurally valid`);
          EOF

      - name: Validate MCP canonical mapping consistency
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync } from 'fs';

          const constantsSource = readFileSync('agent/constants/mcp-servers.ts', 'utf8');
          const canonicalSource = readFileSync('agent/constants/mcp-canonical.ts', 'utf8');
          const caddySource = readFileSync('docker/Caddyfile', 'utf8');

          const constantMatches = [...constantsSource.matchAll(/([A-Z_]+):\s*id\("([^"]+)"\)/g)];
          const allConstants = constantMatches
            .map((m) => m[1])
            .filter((name) => name !== 'HEALTH_MONITOR');

          const mapKeyMatches = [...canonicalSource.matchAll(/^\s{2}([A-Z_]+):\s*entry\(/gm)];
          const mappedConstants = mapKeyMatches.map((m) => m[1]);

          const missingMapKeys = allConstants.filter((name) => !mappedConstants.includes(name));
          if (missingMapKeys.length > 0) {
            console.error(`Missing canonical map entries for: ${missingMapKeys.join(', ')}`);
            process.exit(1);
          }

          const dockerEntries = [
            ...canonicalSource.matchAll(
              /([A-Z_]+):\s*entry\("([A-Z_]+)",\s*"docker-gateway",\s*\{[\s\S]*?dockerService:\s*"([^"]+)"[\s\S]*?gatewayRoute:\s*"(\/[^\"]+)"/g,
            ),
          ].map((m) => ({
            mapKey: m[1],
            constant: m[2],
            dockerService: m[3],
            gatewayRoute: m[4],
          }));

          if (dockerEntries.length === 0) {
            console.error('No docker-gateway canonical entries found');
            process.exit(1);
          }

          const badKeys = dockerEntries.filter((e) => e.mapKey !== e.constant);
          if (badKeys.length > 0) {
            console.error(`Canonical key/constant mismatches: ${badKeys.map((e) => `${e.mapKey}->${e.constant}`).join(', ')}`);
            process.exit(1);
          }

          const duplicateValues = (values) => {
            const counts = new Map();
            for (const value of values) {
              counts.set(value, (counts.get(value) ?? 0) + 1);
            }
            return [...counts.entries()].filter(([, count]) => count > 1).map(([value]) => value);
          };

          const duplicateServices = duplicateValues(dockerEntries.map((e) => e.dockerService));
          const duplicateRoutes = duplicateValues(dockerEntries.map((e) => e.gatewayRoute));

          if (duplicateServices.length > 0) {
            console.error(`Duplicate canonical docker services: ${duplicateServices.join(', ')}`);
            process.exit(1);
          }

          if (duplicateRoutes.length > 0) {
            console.error(`Duplicate canonical gateway routes: ${duplicateRoutes.join(', ')}`);
            process.exit(1);
          }

          for (const entry of dockerEntries) {
            const routePattern = new RegExp(`handle ${entry.gatewayRoute.replace('/', '\\/')}\/\\*`);
            const servicePattern = new RegExp(`reverse_proxy ${entry.dockerService}:8000`);
            if (!routePattern.test(caddySource)) {
              console.error(`Caddyfile missing route for ${entry.mapKey}: ${entry.gatewayRoute}/*`);
              process.exit(1);
            }
            if (!servicePattern.test(caddySource)) {
              console.error(`Caddyfile missing reverse_proxy target for ${entry.mapKey}: ${entry.dockerService}:8000`);
              process.exit(1);
            }
          }

          console.log('✓ MCP canonical mapping and Caddy parity validated');
          EOF

      - name: Generate workflow summary
        run: |
          echo "## Agent Skill System — Daily Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +"%Y-%m-%d %H:%M UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Registered Skills" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Skill ID | Cost Tier | Dry-Run | Servers |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----------|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| code-search | cheap | No | ast-grep |" >> $GITHUB_STEP_SUMMARY
          echo "| browser-testing | expensive | No | playwright-mcp-server |" >> $GITHUB_STEP_SUMMARY
          echo "| github-actions | medium | Yes | github-official |" >> $GITHUB_STEP_SUMMARY
          echo "| send-notification | cheap | Yes | resend |" >> $GITHUB_STEP_SUMMARY
          echo "| reasoning-chain | expensive | No | sequentialthinking, memory |" >> $GITHUB_STEP_SUMMARY
          echo "| health-check | cheap | No | (meta — no external servers) |" >> $GITHUB_STEP_SUMMARY
          echo "| nextjs-agent-setup | cheap | Yes | (none) |" >> $GITHUB_STEP_SUMMARY
          echo "| skill-builder | medium | Yes | memory |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Sub-Agent Pools" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Agent Pool | Allowed Servers |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|-----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| code-intelligence-agent | ast-grep, github-official |" >> $GITHUB_STEP_SUMMARY
          echo "| browser-agent | playwright-mcp-server |" >> $GITHUB_STEP_SUMMARY
          echo "| reasoning-agent | sequentialthinking, memory |" >> $GITHUB_STEP_SUMMARY
          echo "| notification-agent | resend |" >> $GITHUB_STEP_SUMMARY
          echo "| content-agent | fetch, wikipedia-mcp, youtube_transcript |" >> $GITHUB_STEP_SUMMARY
          echo "| devtools-agent | next-devtools-mcp, context7 |" >> $GITHUB_STEP_SUMMARY
      - name: Teardown ephemeral stack
        if: always()
        run: |
          echo "No ephemeral stack resources to tear down"
  mcp-compat:
    name: MCP runtime compatibility check
    needs: health-and-audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Derive priority services from mcp-canonical.ts
        run: |
          node --input-type=module <<'JSEOF'
          import { readFileSync, appendFileSync } from 'fs';

          const canonicalSrc = readFileSync('agent/constants/mcp-canonical.ts', 'utf8');

          // Extract priority server constants from MCP_CANONICAL_PRIORITY_SERVERS array
          const priorityBlockMatch = canonicalSrc.match(
            /MCP_CANONICAL_PRIORITY_SERVERS[\s\S]*?=\s*\[([\s\S]*?)\]\s*as const/
          );
          if (!priorityBlockMatch) throw new Error('Could not find MCP_CANONICAL_PRIORITY_SERVERS');
          const priorityConstants = [...priorityBlockMatch[1].matchAll(/MCP\.([A-Z_]+)/g)].map(m => m[1]);

          // Extract dockerService for each constant from MCP_CANONICAL_MAP entries
          const allEntryMatches = [...canonicalSrc.matchAll(
            /(\w+):\s*entry\("[^"]*",\s*"docker-gateway",\s*\{[^}]*dockerService:\s*"([^"]+)"/g
          )];
          const dockerServiceMap = {};
          for (const [, key, ds] of allEntryMatches) dockerServiceMap[key] = ds;

          // CI ephemeral port allocation (deterministic, never conflicts with host services)
          const portMap = {
            'github-official':    8100,
            'memory-reference':   8101,
            'nextjs-devtools':    8102,
            'openapi-schema':     8103,
            'sequential-thinking': 8104,
            'playwright':         8105,
            'executor-playwright': 8106,
            'wikipedia':          8107,
          };

          const services = [];
          for (const constant of priorityConstants) {
            const dockerService = dockerServiceMap[constant];
            if (!dockerService) { console.warn('No dockerService for constant:', constant); continue; }
            const port = portMap[dockerService];
            if (port === undefined) { console.warn('No port for dockerService:', dockerService); continue; }
            services.push({ constant, dockerService, port });
          }

          const json = JSON.stringify(services);
          appendFileSync(process.env.GITHUB_ENV, `MCP_PRIORITY_SERVICES=${json}\n`);
          console.log('Derived priority services:', json);
          console.log('Total:', services.length, 'services');
          JSEOF

      - name: Generate docker-compose.mcp-ci.yml
        run: |
          node --input-type=module <<'JSEOF'
          import { writeFileSync } from 'fs';

          const services = JSON.parse(process.env.MCP_PRIORITY_SERVICES);

          let compose = 'services:\n';
          for (const { dockerService, port } of services) {
            const svcName = dockerService.replace(/-/g, '_');
            compose += `  ${svcName}:\n`;
            compose += `    image: node:20-alpine\n`;
            compose += `    command: ["node", "/srv/server.js"]\n`;
            compose += `    volumes:\n`;
            compose += `      - ./docker/${dockerService}/server.js:/srv/server.js:ro\n`;
            compose += `    environment:\n`;
            compose += `      PORT: "8000"\n`;
            compose += `    ports:\n`;
            compose += `      - "${port}:8000"\n`;
            compose += `    networks:\n`;
            compose += `      - mcp-ci-net\n`;
            compose += `    healthcheck:\n`;
            compose += `      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]\n`;
            compose += `      interval: 5s\n`;
            compose += `      timeout: 3s\n`;
            compose += `      retries: 12\n`;
            compose += `      start_period: 5s\n\n`;
          }
          compose += 'networks:\n  mcp-ci-net:\n    driver: bridge\n';

          writeFileSync('docker-compose.mcp-ci.yml', compose);
          console.log('Generated docker-compose.mcp-ci.yml:\n' + compose);
          JSEOF

      - name: Start ephemeral MCP stack
        run: docker compose -f docker-compose.mcp-ci.yml up -d

      - name: Wait for MCP services to be healthy
        run: |
          node --input-type=module <<'JSEOF'
          import { execSync } from 'child_process';

          const services = JSON.parse(process.env.MCP_PRIORITY_SERVICES);
          const timeoutSec = 60;

          async function waitForService(dockerService, port) {
            const deadline = Date.now() + timeoutSec * 1000;
            while (Date.now() < deadline) {
              try {
                execSync(`curl -sf http://localhost:${port}/health`, { stdio: 'pipe' });
                console.log('✓', dockerService, 'is healthy on port', port);
                return;
              } catch {
                await new Promise(r => setTimeout(r, 3000));
              }
            }
            throw new Error(dockerService + ' failed health check after ' + timeoutSec + 's');
          }

          try {
            await Promise.all(services.map(({ dockerService, port }) => waitForService(dockerService, port)));
            console.log('All MCP priority services are healthy');
          } catch (err) {
            console.error(err.message);
            process.exit(1);
          }
          JSEOF

      - name: Run MCP initialize and tools/list per service
        run: |
          node --input-type=module <<'JSEOF'
          import { execSync } from 'child_process';

          const services = JSON.parse(process.env.MCP_PRIORITY_SERVICES);
          let failed = false;

          for (const { dockerService, port } of services) {
            // GET /health (MCP initialize equivalent for stub servers)
            try {
              const healthRaw = execSync(`curl -sf http://localhost:${port}/health`, { encoding: 'utf8' });
              const health = JSON.parse(healthRaw);
              console.log('✓', dockerService, '/health status:', health.status);
            } catch {
              console.error('✗', dockerService, '/health unreachable');
              failed = true;
            }

            // GET /tools (MCP tools/list equivalent)
            try {
              const toolsRaw = execSync(`curl -sf http://localhost:${port}/tools`, { encoding: 'utf8' });
              const tools = JSON.parse(toolsRaw);
              console.log('✓', dockerService, '/tools ready:', tools.ready, '— tools:', tools.tools?.length ?? 0);
            } catch {
              console.error('✗', dockerService, '/tools unreachable');
              failed = true;
            }
          }

          if (failed) process.exit(1);
          JSEOF

      - name: Dry-run smoke call per service
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node --input-type=module <<'JSEOF'
          import { execSync } from 'child_process';

          const services = JSON.parse(process.env.MCP_PRIORITY_SERVICES);
          let failed = false;

          for (const { constant, dockerService, port } of services) {
            const isGitHub = constant === 'GITHUB';
            const authFlag = isGitHub ? `-H "Authorization: Bearer ${process.env.GH_TOKEN}"` : '';
            try {
              execSync(`curl -sf ${authFlag} http://localhost:${port}/info`, { stdio: 'pipe' });
              console.log('✓', dockerService, '/info OK');
            } catch {
              // /info may not be implemented on all stubs — fall back to /health
              try {
                execSync(`curl -sf ${authFlag} http://localhost:${port}/health`, { stdio: 'pipe' });
                console.log('✓', dockerService, '(/info→/health fallback) OK');
              } catch {
                console.error('✗', dockerService, 'smoke call failed on both /info and /health');
                failed = true;
              }
            }
          }

          if (failed) process.exit(1);
          JSEOF

      - name: Collect MCP stack logs
        if: always()
        run: docker compose -f docker-compose.mcp-ci.yml logs --no-color

      - name: Teardown MCP stack
        if: always()
        run: docker compose -f docker-compose.mcp-ci.yml down --remove-orphans

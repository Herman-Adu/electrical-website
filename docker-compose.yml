services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SKIP_ENV_VALIDATION: "false"
    image: electrical-website:local
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "3100:3100"
    volumes:
      - ./docker/Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      github-official:
        condition: service_healthy
      openapi-schema:
        condition: service_healthy
      playwright:
        condition: service_healthy
      sequential-thinking:
        condition: service_healthy
      memory-reference:
        condition: service_healthy
      nextjs-devtools:
        condition: service_healthy
      executor-playwright:
        condition: service_healthy
      wikipedia:
        condition: service_healthy
      youtube-transcript:
        condition: service_healthy
      mcp-aggregator:
        condition: service_healthy
    restart: unless-stopped

  github-official:
    image: node:22-alpine
    working_dir: /srv
    command: ["node", "/srv/server.js"]
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ./docker/github-official/server.js:/srv/server.js:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  openapi-schema:
    image: node:22-alpine
    working_dir: /srv
    command: ["node", "/srv/server.js"]
    volumes:
      - ./docker/openapi-schema/server.js:/srv/server.js:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    working_dir: /srv
    command: ["node", "/srv/server.js"]
    volumes:
      - ./docker/playwright/server.js:/srv/server.js:ro
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('node:http').get('http://127.0.0.1:8000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  sequential-thinking:
    image: node:22-alpine
    working_dir: /srv
    command: ["node", "/srv/server.js"]
    volumes:
      - ./docker/sequential-thinking/server.js:/srv/server.js:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  memory-reference:
    image: node:22-alpine
    working_dir: /srv
    command: ["node", "/srv/server.js"]
    environment:
      MEMORY_FILE_PATH: /data/memory-graph.json
    volumes:
      - ./docker/memory-reference/server.js:/srv/server.js:ro
      - memory_data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  nextjs-devtools:
    image: node:22-alpine
    working_dir: /workspace
    command: ["node", "/srv/server.js"]
    volumes:
      - ./docker/nextjs-devtools/server.js:/srv/server.js:ro
      - .:/workspace:ro
      - /workspace/node_modules
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  executor-playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    working_dir: /srv
    command: ["node", "/srv/server.js"]
    volumes:
      - ./docker/executor-playwright/server.js:/srv/server.js:ro
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('node:http').get('http://127.0.0.1:8000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  wikipedia:
    image: node:22-alpine
    working_dir: /srv
    command: ["node", "/srv/server.js"]
    volumes:
      - ./docker/wikipedia/server.js:/srv/server.js:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  youtube-transcript:
    build: ./docker/youtube-transcript
    working_dir: /srv
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  mcp-aggregator:
    build: ./docker/mcp-aggregator
    working_dir: /srv
    expose:
      - "8000"
    depends_on:
      github-official:
        condition: service_healthy
      openapi-schema:
        condition: service_healthy
      playwright:
        condition: service_healthy
      sequential-thinking:
        condition: service_healthy
      memory-reference:
        condition: service_healthy
      nextjs-devtools:
        condition: service_healthy
      executor-playwright:
        condition: service_healthy
      wikipedia:
        condition: service_healthy
      youtube-transcript:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  memory_data:

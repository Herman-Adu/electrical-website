        - paragraph [ref=e210]: Co-Founder & Managing Director
        - generic [ref=e211]:
          - paragraph [ref=e212]: Richard Barber is the Co-Founder and Managing Director of Nexgen Electrical Innovations Ltd, bringing over 27 years of experience across the domestic, commercial, and industrial electrical sectors. With a career built on technical expertise, leadership, and a strong client-first mindset, Richard plays a pivotal role in driving the company’s strategic direction and operational excellence.
          - paragraph [ref=e213]: "Together with co-founder Gavin Little, Richard established Nexgen with a clear vision: not just to meet industry standards, but to set them. This ethos underpins every aspect of the business, ensuring a consistent focus on quality, reliability, and long-term client relationships."
          - paragraph [ref=e214]: Richard leads on strategic planning, operational oversight, and business development, while fostering a culture built on strong communication, accountability, and continuous improvement. His leadership ensures that both clients and strategic partners receive a service that is professional, responsive, and aligned with their needs.
          - paragraph [ref=e215]: A firm believer in giving back to the community, Richard is actively involved in supporting local initiatives. Nexgen proudly sponsors local sports clubs and provides compliance services to charities, helping them allocate their resources where they are needed most.

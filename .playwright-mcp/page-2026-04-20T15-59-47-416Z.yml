        - heading "Gavin Little" [level=2] [ref=e266]
        - paragraph [ref=e267]: Co-Founder & Managing Director
        - generic [ref=e268]:
          - paragraph [ref=e269]: Gavin Little co-founded Nexgen Electrical Innovations Ltd alongside Richard Barber, with a clear vision — to deliver high-quality electrical services that combine technical excellence with a genuinely client-focused approach. Together, they have built Nexgen into a trusted contractor across the FM, commercial, and fit-out sectors.
          - paragraph [ref=e270]: Drawing on a strong background in commercial and industrial electrical systems, Gavin leads the business across operations, project delivery, and client relationships. Working closely with Richard, the leadership team ensures every project is delivered to the highest standard, with a shared commitment to quality, accountability, and consistency.
          - paragraph [ref=e271]: Gavin’s hands-on approach and attention to detail have been instrumental in establishing Nexgen’s reputation for reliability, professionalism, and quality workmanship.
          - paragraph [ref=e272]: He has also played a key role in securing and maintaining key industry accreditations including NICEIC Approved Contractor, SafeContractor, and Achilles Gold — reinforcing the company’s commitment to compliance, safety, and best practice across all works.
          - paragraph [ref=e273]: Beyond project delivery, Gavin is focused on building long-term partnerships with clients by removing common pain points within project management. Through a collaborative, team-led approach, Nexgen delivers a fully managed service that ensures efficiency, clear communication, and complete transparency from start to finish.

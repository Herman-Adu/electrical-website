# Development compose — hot-reload with source mounted as volume.
# Usage: docker compose -f docker-compose.dev.yml up
#
# Differences from docker-compose.yml (production):
#   - Builds from Dockerfile.dev (no standalone output, no multi-stage)
#   - Source is mounted at /app so edits on the host trigger Next.js HMR
#   - node_modules and .next live in named volumes (Linux binaries, isolated from host)
#   - WATCHPACK_POLLING=true ensures file-change events work on Windows / Docker Desktop

services:
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: electrical-website:dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app # bind-mount source for hot-reload
      - nm_dev:/app/node_modules # container-native linux node_modules
      - next_dev:/app/.next # persist Next.js incremental cache
    env_file:
      - .env.local # secrets injected at runtime, never in image
    environment:
      NODE_ENV: development
      HOSTNAME: "0.0.0.0" # expose dev server to host
      PORT: "3000"
      WATCHPACK_POLLING: "true" # reliable file-watching on Windows / WSL2

  caddy:
    image: caddy:2-alpine
    ports:
      - "3100:3100"
    volumes:
      - ./docker/Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      github-official:
        condition: service_healthy
      openapi-schema:
        condition: service_healthy
      playwright:
        condition: service_healthy
      sequential-thinking:
        condition: service_healthy
      memory-reference:
        condition: service_healthy
      nextjs-devtools:
        condition: service_healthy
      executor-playwright:
        condition: service_healthy
      wikipedia:
        condition: service_healthy
    restart: unless-stopped

  github-official:
    image: node:22-alpine
    working_dir: /srv
    command: ["node", "/srv/server.js"]
    volumes:
      - ./docker/github-official/server.js:/srv/server.js:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  openapi-schema:
    image: node:22-alpine
    working_dir: /srv
    command: ["node", "/srv/server.js"]
    volumes:
      - ./docker/openapi-schema/server.js:/srv/server.js:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    working_dir: /srv
    command: ["node", "/srv/server.js"]
    volumes:
      - ./docker/playwright/server.js:/srv/server.js:ro
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('node:http').get('http://127.0.0.1:8000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  sequential-thinking:
    image: node:22-alpine
    working_dir: /srv
    command: ["node", "/srv/server.js"]
    volumes:
      - ./docker/sequential-thinking/server.js:/srv/server.js:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  memory-reference:
    image: node:22-alpine
    working_dir: /srv
    command: ["node", "/srv/server.js"]
    volumes:
      - ./docker/memory-reference/server.js:/srv/server.js:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  nextjs-devtools:
    image: node:22-alpine
    working_dir: /srv
    command: ["node", "/srv/server.js"]
    volumes:
      - ./docker/nextjs-devtools/server.js:/srv/server.js:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  executor-playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    working_dir: /srv
    command: ["node", "/srv/server.js"]
    volumes:
      - ./docker/executor-playwright/server.js:/srv/server.js:ro
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",

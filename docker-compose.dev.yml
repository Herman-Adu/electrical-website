        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  wikipedia:
    image: node:22-alpine
    working_dir: /srv
    command: ["node", "/srv/server.js"]
    volumes:
      - ./docker/wikipedia/server.js:/srv/server.js:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  nm_dev:
  next_dev:

# Development compose — hot-reload with source mounted as volume.
# Usage: docker compose -f docker-compose.dev.yml up
#
# Differences from docker-compose.yml (production):
#   - Builds from Dockerfile.dev (no standalone output, no multi-stage)
#   - Source is mounted at /app so edits on the host trigger Next.js HMR
#   - node_modules and .next live in named volumes (Linux binaries, isolated from host)
#   - WATCHPACK_POLLING=true ensures file-change events work on Windows / Docker Desktop

services:
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: electrical-website:dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app # bind-mount source for hot-reload
      - nm_dev:/app/node_modules # container-native linux node_modules
      - next_dev:/app/.next # persist Next.js incremental cache
    env_file:
      - .env.local # secrets injected at runtime, never in image
    environment:
      NODE_ENV: development
      HOSTNAME: "0.0.0.0" # expose dev server to host
      PORT: "3000"
      WATCHPACK_POLLING: "true" # reliable file-watching on Windows / WSL2

volumes:
  nm_dev:
  next_dev:
